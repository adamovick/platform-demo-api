name: Build, Push and Update GitOps

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/adamovick/platform-demo-api
  GITOPS_REPO: adamovick/platform-lab-gitops
  GITOPS_BRANCH: main
  DEPLOYMENT_FILE: environments/dev/dotnet-api/kustomization.yaml

jobs:
  build-and-update-gitops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app source code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./PlatformDemoApi
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            APP_COMMIT_SHA=${{ github.sha }}
            APP_BUILD_TIME=${{ github.run_started_at }}

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag in GitOps repo
        run: |
          cd gitops
          sed -i "s|newTag: .*|newTag: ${{ github.sha }}|g" ${{ env.DEPLOYMENT_FILE }}
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ${{ env.DEPLOYMENT_FILE }}
          git commit -m "update platform-demo-api image to ${{ github.sha }}" || echo "No changes to commit"
          git push origin ${{ env.GITOPS_BRANCH }}
